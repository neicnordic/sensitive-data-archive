global:
  schemaType: "isolated"
  ingress:
    deploy: true
    hostName:
      api: api.127.0.0.1.nip.io
      auth: auth.127.0.0.1.nip.io
      download: download.127.0.0.1.nip.io
      s3Inbox: inbox.127.0.0.1.nip.io
      syncapi: sync-api.127.0.0.1.nip.io
  log:
    level: "debug"
  tls:
    enabled: false
    issuer: ""
    clusterIssuer: "cert-issuer"
  api:
    jwtPubKeyName: jwt.pub
    jwtSecret: jwk
    rbacFileSecret: api-rbac
  archive:
    s3:
    - endpoint: PLACEHOLDER_VALUE
      accessKey: PLACEHOLDER_VALUE
      secretKey: PLACEHOLDER_VALUE
      bucketPrefix: archive
      port: 9000
  backupArchive:
    s3:
    - endpoint: PLACEHOLDER_VALUE
      accessKey: PLACEHOLDER_VALUE
      secretKey: PLACEHOLDER_VALUE
      bucketPrefix: backup
      port: 9000
  inbox:
    s3:
    - endpoint: PLACEHOLDER_VALUE
      accessKey: PLACEHOLDER_VALUE
      secretKey: PLACEHOLDER_VALUE
      bucketPrefix: inbox
      port: 9000
  s3Inbox:
    accessKey: PLACEHOLDER_VALUE
    secretKey: PLACEHOLDER_VALUE
    url: PLACEHOLDER_VALUE
    port: 9000
    bucket: "inbox"
    readyPath: "/minio/health/ready"
  auth:
    jwtSecret: jwk
    jwtAlg: ES256
    jwtKey: jwt.key
    jwtPub: jwt.pub
    jwtTTL: 168
    resignJwt: true
  broker:
    durable: true
    host: "broker-sda-mq"
    port: 5672
    ssl: false
    username: "admin"
    password: PLACEHOLDER_VALUE
  cega:
    host: https://cega-nss:8443/username
    password: PLACEHOLDER_VALUE
    user: PLACEHOLDER_VALUE
  c4gh:
    secretName: c4gh
    publicKey: c4gh.pub.pem
    privateKeys:
      - keyName: c4gh.sec.pem
        passphrase: PLACEHOLDER_VALUE
    syncPubKey: c4gh.pub.pem
  db:
    host: "postgres-sda-db"
    user: "postgres"
    password: PLACEHOLDER_VALUE
    admin:
      username: "postgres"
      password: PLACEHOLDER_VALUE
  doa:
    enabled: false
  download:
    enabled: true
    trusted:
      configPath: "iss"
      configFile: "iss.json"
      iss:
        - iss: "http://oidc:8080"
          jku: "http://oidc:8080/jwk"
  oidc:
    provider: "http://oidc:8080"
    jwkPath: "/jwk"
    id: DfCieZLuBU
    secret: DfCieZLuBU
  reencrypt:
    host: pipeline-sda-svc-reencrypt
    port: 50051
  sync:
    api:
      password: "apiuser"
      user: "apipass"
    brokerQueue: "mapping_stream"
    centerPrefix: "SYNC"
    destination:
      s3:
      - endpoint: PLACEHOLDER_VALUE
        accessKey: PLACEHOLDER_VALUE
        secretKey: PLACEHOLDER_VALUE
        bucketPrefix: sync
        port: 9000
        region: us-east-1
    remote:
      host: "http://remote-sync"
      port: "8080"
      password: "pass"
      user: "user"
api:
  replicaCount: 1
  resources: null
auth:
  replicaCount: 1
  resources: null
backup:
  deploy: true
  resources: null
doa:
  deploy: false
download:
  resources: null
  replicaCount: 1
finalize:
  resources: null
ingest:
  resources: null
intercept:
  resources: null
mapper:
  resources: null
releasetest:
  run: false
s3Inbox:
  resources: null
  replicaCount: 1
sftpInbox:
  resources: null
  replicaCount: 1
verify:
  resources: null