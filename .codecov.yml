# Codecov configuration
# Documentation: https://docs.codecov.io/docs/codecovyml-reference

# Files to exclude from coverage reporting
ignore:
  # Main entry points - tested via integration tests
  - "sda/cmd/*/main.go"

  # Benchmark CLI tool - tested via integration tests
  - "sda/cmd/download/benchmark/benchmark.go"

  # Generated files
  - "**/*_gen.go"
  - "**/mocks/**"

  # Test files (already excluded by default, but explicit)
  - "**/*_test.go"

coverage:
  status:
    project:
      default:
        threshold: 1%
    patch:
      default:
        target: 20%

flags:
  unittests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
