{{- if or (or (eq "all" .Values.global.deploymentType) (eq "external" .Values.global.deploymentType) ) (not .Values.global.deploymentType) }}
{{- if .Values.global.doa.enabled }}
{{- $doaArcS3 := default (list) .Values.global.archive.s3 }}
{{- $doaArcPosix := default (list) .Values.global.archive.posix }}
{{- if gt (add (len $doaArcS3) (len $doaArcPosix)) 1 }}
{{- fail "DOA cannot be enabled together with multi-endpoint archive (DOA reads only the first endpoint). Disable DOA or reduce to a single endpoint." }}
{{- end }}
{{- if and (empty .Values.global.archive.s3) (empty .Values.global.archive.posix) }}
{{- fail "DOA is enabled but no archive endpoint is configured (set global.archive.s3 or global.archive.posix)" }}
{{- end }}
{{- end }}
{{- if .Values.global.tls.enabled }}
{{- if .Values.global.doa.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "sda.fullname" . }}-doa
  labels:
    role: doa
    app: {{ template "sda.fullname" . }}-doa
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    component: {{ template "sda.fullname" . }}-doa
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
spec:
  replicas: {{ .Values.doa.replicaCount }}
  revisionHistoryLimit: {{ default "3" .Values.global.revisionHistory }}
  selector:
    matchLabels:
      app: {{ template "sda.fullname" . }}-doa
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ template "sda.fullname" . }}-doa
        role: doa
        release: {{ .Release.Name }}
      annotations:
        {{- if not .Values.global.vaultSecrets }}
        checksum/secret: {{ include (print $.Template.BasePath "/doa-secrets.yaml") . | sha256sum }}
        {{- end }}
{{- if .Values.global.podAnnotations }}
{{- toYaml .Values.global.podAnnotations | nindent 8 -}}
{{- end }}
{{- if .Values.doa.annotations }}
{{- toYaml .Values.doa.annotations | nindent 8 -}}
{{- end }}
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        whenUnsatisfiable: DoNotSchedule
        topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app: {{ template "sda.fullname" . }}-doa
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - {{ template "sda.fullname" . }}-doa
            topologyKey: kubernetes.io/hostname
    {{- if .Values.global.rbacEnabled}}
      serviceAccountName: {{ .Release.Name }}
    {{- end }}
      securityContext:
        runAsUser: 65534 
        runAsGroup: 65534
        fsGroup: 65534
    {{- if not .Values.global.pkiService }}
      initContainers:
      - name: init-java-certs
        image: neicnordic/openssl-alpine:latest
        command:
          - /bin/sh
          - -c
          - |
            keytool -import \
                    -trustcacerts \
                    -file /tls-certs/ca.crt \
                    -alias legaCA -storetype JKS \
                    -keystore /tls/cacerts \
                    -storepass "${KEYSTORE_PASSWORD}" \
                    -noprompt &&
            openssl pkcs12 -export \
                           -out /tls/doa.p12 \
                           -inkey /tls-certs/tls.key \
                           -in /tls-certs/tls.crt \
                           -passout pass:"${KEYSTORE_PASSWORD}" &&
            openssl pkcs8 -topk8 \
                          -inform pem \
                          -outform der \
                          -in /tls-certs/tls.key \
                          -out /tls/tls.key.der \
                          -nocrypt &&
            cp /tls-certs/* /tls/
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          seccompProfile:
            type: "RuntimeDefault"
        env:
        - name: KEYSTORE_PASSWORD
          value: {{ required "Keystore password is required" .Values.sftpInbox.keystorePass | quote }}
        volumeMounts:
        - name: tls-certs
          mountPath: /tls-certs
        - name: tmp
          mountPath: /tls
    {{- end }}
      containers:
      - name: doa
        image: "{{ .Values.doa.repository }}:{{ .Values.doa.imageTag }}"
        imagePullPolicy: {{ .Values.image.imagePullPolicy | quote }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          seccompProfile:
            type: "RuntimeDefault"
{{- if .Values.global.extraSecurityContext }}
{{- toYaml .Values.global.extraSecurityContext | nindent 10 -}}
{{- end }}
      {{- if .Values.global.vaultSecrets }}
        command: ["/bin/sh"]
        args: ["-c", "source {{ include "secretsPath" . }}/{{ .Values.global.doa.envFile }} && docker-entrypoint.sh && java -jar /localega-doa.jar"]
      {{- end }}
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: no-oss,LocalEGA
      {{- if .Values.global.doa.outbox.enabled }}
        - name: BROKER_HOST
          value: {{ required "A valid MQ host is required" .Values.global.broker.host | quote }}
        - name: BROKER_PORT
          value: {{ .Values.global.broker.port | quote }}
        - name: BROKER_VHOST
          value: {{ .Values.global.broker.vhost | quote }}
        - name: BROKER_VALIDATE
          value: {{ .Values.global.broker.verifyPeer | quote }}
        {{- if not .Values.global.vaultSecrets }}
        - name: BROKER_USERNAME
          valueFrom:
              secretKeyRef:
                name: {{ template "sda.fullname" . }}-doa
                key: mqUser
        - name: BROKER_PASSWORD
          valueFrom:
              secretKeyRef:
                name: {{ template "sda.fullname" . }}-doa
                key: mqPassword
        {{- end }}
      {{- end }}
        - name: DB_INSTANCE
          value: {{ required "A valid database host is required" .Values.global.db.host | quote}}
        - name: DB_PORT
          value: {{ .Values.global.db.port | quote }}
        - name: POSTGRES_DB
          value: {{ required "A database name is required" .Values.global.db.name | quote }}
        - name: SSL_MODE
          value: {{ .Values.global.db.sslMode | quote }}
        {{- if not .Values.global.vaultSecrets }}
        - name: POSTGRES_USER
          value: {{ include "dbUserDoa" . | quote }}
        - name: POSTGRES_PASSWORD
          valueFrom:
              secretKeyRef:
                name: {{ template "sda.fullname" . }}-doa
                key: dbPassword
        {{- end }}
      {{- if not (empty .Values.global.archive.s3) }}
      {{- $arc := index .Values.global.archive.s3 0 }}
      {{- $endpoint := required "A valid archive S3 endpoint is required" $arc.endpoint }}
      {{- /* DOA's Java MinIO client takes host + port + secure separately,
             while storage-v2 expects a URL with scheme. Normalize here so
             operators can keep one endpoint string per backend. */}}
      {{- $isHttp := hasPrefix "http://" $endpoint }}
      {{- $hostPort := $endpoint | trimPrefix "https://" | trimPrefix "http://" }}
      {{- $hp := splitList ":" $hostPort }}
      {{- $doaHost := index $hp 0 }}
      {{- $doaSecure := ternary "false" "true" $isHttp }}
      {{- $doaPort := "" }}
      {{- if gt (len $hp) 1 }}{{- $doaPort = index $hp 1 }}{{- end }}
      {{- if and (empty $doaPort) $arc.port }}{{- $doaPort = $arc.port | toString }}{{- end }}
      {{- if empty $doaPort }}{{- $doaPort = ternary "80" "443" (eq $doaSecure "false") }}{{- end }}
        - name: ARCHIVE_TYPE
          value: "s3"
        - name: S3_ENDPOINT
          value: {{ $doaHost | quote }}
        - name: S3_PORT
          value: {{ $doaPort | quote }}
        - name: S3_REGION
          value: {{ default "us-east-1" $arc.region }}
        - name: S3_BUCKET
          value: {{ $arc.bucketPrefix | quote }}
        {{- if not .Values.global.vaultSecrets }}
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ template "sda.fullname" . }}-s3archive-keys
              key: s3ArchiveAccessKey
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ template "sda.fullname" . }}-s3archive-keys
              key: s3ArchiveSecretKey
        {{- end }}
        - name: S3_SECURE
          value: {{ $doaSecure | quote }}
        {{- if and (eq $doaSecure "true") .Values.global.tls.enabled }}
        - name: S3_ROOT_CERT_PATH
          value: "/etc/ssl/certs/java/ca.crt"
        {{- end }}
      {{- end }}
      {{- if not (empty .Values.global.archive.posix) }}
      {{- $arc := index .Values.global.archive.posix 0 }}
        - name: ARCHIVE_TYPE
          value: "posix"
        - name: ARCHIVE_PATH
          value: {{ $arc.path | quote }}
      {{- end }}
      {{- if .Values.global.oidc.pubKey }}
        - name: PASSPORT_PUBLIC_KEY_PATH
          value: "{{ include "secretsPath" . }}/{{ .Values.global.oidc.pubKey }}"
      {{- end }}
        - name: KEYSTORE_PATH
          value: {{ ternary (print "/etc/ssl/certs/java/doa.p12") (printf "%s/%s" .Values.global.secretsPath .Values.doa.tls.keyStore) (empty .Values.global.pkiService) }}
        - name: KEYSTORE_PASSWORD
          value: {{ .Values.doa.keystorePass | quote }}
        - name: ROOT_CERT_PATH
          value: {{ ternary (print "/etc/ssl/certs/java/ca.crt" ) (printf "%s/%s" .Values.global.secretsPath .Values.doa.tls.cacert) (empty .Values.global.pkiService) }}
        - name: CERT_PATH
          value: {{ ternary (printf "/etc/ssl/certs/java/tls.crt" ) (printf "%s/%s" .Values.global.secretsPath .Values.doa.tls.certFile) (empty .Values.global.pkiService) }}
        - name: CERT_KEY
          value: {{ ternary (printf "/etc/ssl/certs/java/tls.key.der" ) (printf "%s/%s" .Values.global.secretsPath .Values.doa.tls.keyFile) (empty .Values.global.pkiService) }}
        - name: CRYPT4GH_PRIVATE_KEY_PATH
          value: "{{ template "c4ghPath" . }}/{{ (first .Values.global.c4gh.privateKeys).keyName }}"
        - name: CRYPT4GH_PRIVATE_KEY_PASSWORD_PATH
          value: "{{ template "c4ghPath" . }}/passphrase"
        - name: OPENID_CONFIGURATION_URL
          value: "{{ .Values.global.oidc.provider }}/.well-known/openid-configuration"
        - name: OUTBOX_ENABLED
          value: {{ .Values.global.doa.outbox.enabled | quote }}
      {{- if .Values.global.doa.outbox.enabled }}
        - name: OUTBOX_QUEUE
          value: {{ .Values.global.doa.outbox.queue | quote }}
        - name: OUTBOX_TYPE
          value: {{ .Values.global.doa.outbox.type | quote}}
        {{- if eq "s3" .Values.global.doa.outbox.type }}
        - name: S3_OUT_ENDPOINT
          value: {{ .Values.global.doa.outbox.s3Url | quote}}
        - name: S3_OUT_PORT
          value: {{ .Values.global.doa.outbox.s3Port | quote}}
        - name: S3_OUT_REGION
          value: {{ .Values.global.doa.outbox.s3Region | quote}}
        - name: S3_OUT_BUCKET
          value: {{ .Values.global.doa.outbox.s3Bucket | quote}}
        - name: S3_OUT_SECURE
          value: "true"
        {{- if .Values.global.doa.outbox.s3CaFile }}
        - name: S3_OUT_ROOT_CERT_PATH
          value: "/etc/ssl/certs/java/{{ .Values.doa.tls.javaCert }}"
        {{- end }}
        - name: S3_OUT_ACCESS_KEY
          valueFrom:
              secretKeyRef:
                name: {{ template "sda.fullname" . }}-doa
                key: s3OutboxAccessKey
        - name: S3_OUT_SECRET_KEY
          valueFrom:
              secretKeyRef:
                name: {{ template "sda.fullname" . }}-doa
                key: s3OutboxAccessKey
        {{- else }}
        - name: OUTBOX_LOCATION
          value: {{ .Values.global.doa.outbox.path | quote }}
        {{- end }}
      {{- end }}
      {{- if .Values.global.pkiService }}
        - name: PKI_PATH
          value: {{ include "secretsPath" . }}
      {{- end }}
        ports:
        - name: doa
          containerPort: 8080
          protocol: TCP
        livenessProbe:
{{ toYaml .Values.doa.livenessProbe | trim | indent 10 }}
        readinessProbe:
{{ toYaml .Values.doa.readinessProbe | trim | indent 10 }}
        resources:
{{ toYaml .Values.doa.resources | trim | indent 10 }}
        volumeMounts:
        - name: tmp
          mountPath: "/tmp"
      {{- if not .Values.global.pkiService }}
        - name: tmp
          mountPath: "/etc/ssl/certs/java"
      {{- end }}
      {{- if not .Values.global.vaultSecrets }}
      {{- if .Values.global.oidc.pubKey }}
        - name: jwt-token
          mountPath: {{ include "secretsPath" . }}
      {{- end }}
        - name: c4gh-key
          mountPath: {{ template "c4ghPath" . }}
      {{- end }}
      {{- if not (empty .Values.global.archive.posix) }}
      {{- $arc := index .Values.global.archive.posix 0 }}
        - name: archive
          mountPath: {{ $arc.path | quote }}
      {{- end }}
      enableServiceLinks: false
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if not .Values.global.pkiService }}
        - name: tls-certs
          projected:
            sources:
          {{- if or .Values.global.tls.clusterIssuer .Values.global.tls.issuer }}
            - secret:
                name: {{ template "sda.fullname" . }}-doa-certs
          {{- else }}
            - secret:
                name: {{ required "An certificate issuer or a TLS secret name is required for doa" .Values.doa.tls.secretName }}
          {{- end }}
      {{- end }}
      {{- if not .Values.global.vaultSecrets }}
      {{- if .Values.global.oidc.pubKey }}
        - name: jwt-token
          projected:
            defaultMode: 0440
            sources:
            - secret:
                name: {{ template "sda.fullname" . }}-doa
                items:
                  - key: {{ .Values.global.oidc.pubKey }}
                    path: {{ .Values.global.oidc.pubKey }}
      {{- end }}
        - name: c4gh-key
          projected:
            defaultMode: 0440
            sources:
            - secret:
                name: {{ .Values.global.c4gh.secretName }}
                items:
                  - key: {{ (first .Values.global.c4gh.privateKeys).keyName }}
                    path: {{ (first .Values.global.c4gh.privateKeys).keyName }}
            - secret:
                name: {{ template "sda.fullname" . }}-doa
                items:
                  - key: c4ghPassphrase
                    path: passphrase
      {{- end }}
      {{- if not (empty .Values.global.archive.posix) }}
      {{- $arc := index .Values.global.archive.posix 0 }}
        - name: archive
        {{- if $arc.volume.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ $arc.volume.existingClaim }}
        {{- else }}
          nfs:
            server: {{ required "An archive NFS server is required" $arc.volume.nfsServer | quote }}
            path: {{ default "/" $arc.volume.nfsPath | quote }}
        {{- end }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
