{{- if or (or (eq "all" .Values.global.deploymentType) (eq "external" .Values.global.deploymentType) ) (not .Values.global.deploymentType) }}
{{- if and .Values.global.downloadV2.enabled  (not .Values.global.vaultSecrets) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "sda.fullname" . }}-download-v2
type: Opaque
stringData:
  config.yaml: |-
    api:
      host: "0.0.0.0"
      port: 8080
    db:
      host: {{ .Values.global.db.host }}
      port: {{ .Values.global.db.port }}
      user: {{ required "DB user is required" (include "dbUserDownload" .) }}
      password: {{ required "DB pass is required" (include "dbPassDownload" .) }}
      database: {{ .Values.global.db.name }}
      sslmode: {{ ternary .Values.global.db.sslMode "disable" .Values.global.tls.enabled }}
      {{- if .Values.global.tls.enabled }}
      cacert: {{ template "tlsPath" . }}/ca.crt
      clientcert: {{ template "tlsPath" . }}/tls.crt
      clientkey: {{ template "tlsPath" . }}/tls.key
      {{- end }}
    grpc:
      host: {{ default (printf "%s-reencrypt" (include "sda.fullname" .)) .Values.global.reencrypt.host }}
      port: {{ ternary 50443 50051 .Values.global.tls.enabled }}
      timeout: {{ default 30 .Values.global.reencrypt.timeout }}
      {{- if .Values.global.tls.enabled }}
      cacert: {{ template "tlsPath" . }}/ca.crt
      client-cert: {{ template "tlsPath" . }}/tls.crt
      client-key: {{ template "tlsPath" . }}/tls.key
      {{- end }}
    log:
      level: {{ .Values.global.log.level }}
    service:
      id: {{ .Values.global.downloadV2.service.id }}
      org-name: {{ .Values.global.downloadV2.service.orgName }}
      org-url: {{ .Values.global.downloadV2.service.orgURL }}
    jwt:
      {{- if .Values.global.oidc.jwtSecret }}
      pubkey-path: {{ template "jwtPath" . }}
      {{- end }}
      pubkey-url: {{ .Values.global.downloadV2.jwt.pubkeyURL }}
      allow-all-data: {{ .Values.global.downloadV2.jwt.allowAllData }}
    oidc:
      issuer: {{ .Values.global.oidc.provider | trimSuffix "/" }}
      audience: {{ .Values.global.oidc.id }}
    session:
      expiration: {{ .Values.global.downloadV2.session.expiration }}
      domain: {{ default .Values.global.ingress.hostName.downloadV2 .Values.global.downloadV2.session.domain }}
      secure: {{ .Values.global.downloadV2.session.secure }}
      http-only: {{ .Values.global.downloadV2.session.httpOnly }}
      name: {{ .Values.global.downloadV2.session.name }}
    permission:
      model: {{ .Values.global.downloadV2.permission.model }}
    auth:
      allow-opaque: {{ .Values.global.downloadV2.auth.allowOpaque }}
    {{- if .Values.global.downloadV2.visa.enabled }}
    visa:
      enabled: true
      source: {{ .Values.global.downloadV2.visa.source }}
      userinfo-url: {{ .Values.global.downloadV2.visa.userinfoURL }}
      trusted-issuers-path: {{ template "trustedIssPath" . }}/iss.json
      dataset-id-mode: {{ .Values.global.downloadV2.visa.datasetIdMode }}
      identity:
        mode: {{ .Values.global.downloadV2.visa.identityMode }}
      validate-asserted: {{ .Values.global.downloadV2.visa.validateAsserted }}
      allow-insecure-jku: {{ .Values.global.downloadV2.visa.allowInsecureJku }}
      cache:
        token-ttl: {{ .Values.global.downloadV2.visa.cache.tokenTTL }}
        jwk-ttl: {{ .Values.global.downloadV2.visa.cache.jwkTTL }}
        validation-ttl: {{ .Values.global.downloadV2.visa.cache.validationTTL }}
        userinfo-ttl: {{ .Values.global.downloadV2.visa.cache.userinfoTTL }}
      limits:
        max-visas: {{ .Values.global.downloadV2.visa.limits.maxVisas }}
        max-jwks-per-request: {{ .Values.global.downloadV2.visa.limits.maxJwksPerRequest }}
        max-visa-size: {{ .Values.global.downloadV2.visa.limits.maxVisaSize }}
    {{- end }}
    cache:
      enabled: {{ .Values.global.downloadV2.cache.enabled }}
      file-ttl: {{ .Values.global.downloadV2.cache.fileTTL }}
      permission-ttl: {{ .Values.global.downloadV2.cache.permissionTTL }}
      dataset-ttl: {{ .Values.global.downloadV2.cache.datasetTTL }}
    pagination:
      hmac-secret: {{ .Values.global.downloadV2.pagination.hmacSecret }}
    app:
      environment: {{ .Values.global.downloadV2.app.environment }}
    audit:
      required: {{ .Values.global.downloadV2.audit.required }}
    storage:
      archive:
        {{- if eq "s3" .Values.global.archive.storageType }}
        {{- /* TODO: support multiple archive endpoints (v2 storage format is an array) */}}
        s3:
        - endpoint: {{ .Values.global.archive.s3Url }}:{{ .Values.global.archive.s3Port }}
          access_key: {{ .Values.global.archive.s3AccessKey }}
          secret_key: {{ .Values.global.archive.s3SecretKey }}
          bucket_prefix: {{ .Values.global.archive.s3BucketPrefix }}
          region: {{ .Values.global.archive.s3Region }}
          {{- if .Values.global.tls.enabled }}
          ca_cert: {{ template "tlsPath" . }}/ca.crt
          {{- end }}
          {{- if .Values.global.archive.s3ChunkSize }}
          chunk_size: {{ .Values.global.archive.s3ChunkSize }}
          {{- end }}
          disable_https: {{ not .Values.global.tls.enabled }}
        {{- else }}
        posix:
        - path: {{ .Values.global.archive.volumePath }}
        {{- end }}
---
{{- if .Values.global.downloadV2.visa.trustedIssuers }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ template "sda.fullname" . }}-download-v2-iss
type: Opaque
data:
  iss.json: {{ .Values.global.downloadV2.visa.trustedIssuers | toJson | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
